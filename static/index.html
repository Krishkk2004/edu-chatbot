<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduChat Bot</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="app-shell">
    <section id="loginView" class="auth-view card">
      <h1>Welcome to <span>EduChat Bot</span></h1>
      <h2>Login</h2>
      <input id="loginEmail" type="email" placeholder="Email" />
      <input id="loginPassword" type="password" placeholder="Password" />
      <button id="loginBtn">Login</button>
      <p id="loginStatus" class="status"></p>
      <p class="switch">Don't have account? <a href="#" id="gotoSignup">Signup</a></p>
    </section>

    <section id="signupView" class="auth-view card hidden">
      <h1>Create your account</h1>
      <h2>Signup</h2>
      <input id="signupName" placeholder="Name" />
      <input id="signupEmail" type="email" placeholder="Email" />
      <input id="signupPassword" type="password" placeholder="Password" />
      <input id="signupConfirm" type="password" placeholder="Confirm Password" />
      <button id="signupBtn">Create Account</button>
      <p id="signupStatus" class="status"></p>
      <p class="switch">Already have account? <a href="#" id="gotoLogin">Login</a></p>
    </section>

    <section id="chatView" class="chat-layout hidden">


      <aside id="sidebar" class="sidebar card">
        <div class="sidebar-top">
          <h2>EduChat Bot</h2>
          <button id="toggleSidebarBtn" class="ghost">☰</button>
        </div>



      <aside class="sidebar card">
        <h2>EduChat Bot</h2>

        <div id="chatSessions" class="chat-sessions"></div>
        <div class="sidebar-footer">
          <small id="userEmail"></small>
          <button id="logoutBtn" class="ghost">Logout</button>
        </div>
      </aside>

      <section class="chat-main card">
        <header>
          <h2>Ask anything about Anna University</h2>


        </header>

        <div id="chatHistory" class="chat-history"></div>

        <div class="chat-input-row">
          <input id="message" placeholder="Ask your question..." />
          <button id="sendBtn">Send</button>
        </div>

          <p>Notes, Important Questions, Question Papers</p>

        </header>

        <div id="chatHistory" class="chat-history"></div>

        <div class="chat-input-row">
          <input id="message" placeholder="Ask your question..." />
          <button id="sendBtn">Send</button>
        </div>


        <hr />

        <h3>Upload Study Material</h3>
        <form id="uploadForm" class="upload-form">
          <input name="title" placeholder="Title" required />
          <input name="subject" placeholder="Subject (e.g. maths-2)" required />
          <select name="category" id="resourceCategory" required>
            <option value="notes">Notes (PDF)</option>
            <option value="important_questions">Important Questions (Image)</option>
            <option value="question_papers">Question Papers (PDF)</option>
          </select>
          <input name="file" id="resourceFile" type="file" required />
          <button type="submit">Upload</button>
        </form>
        <p id="uploadStatus" class="status"></p>

        <h3>Available Materials</h3>
        <div id="resources"></div>
 
      </section>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
