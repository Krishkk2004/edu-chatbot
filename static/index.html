<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Anna University Edu Chatbot</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="container">
    <h1>Anna University AI Chatbot</h1>

    <section class="card" id="authCard">
      <h2>Login / Signup</h2>
      <div class="row">
        <input id="name" placeholder="Name (for signup)" />
        <input id="email" type="email" placeholder="Email" />
        <input id="password" type="password" placeholder="Password" />
      </div>
      <div class="row">
        <button onclick="signup()">Signup</button>
        <button onclick="login()">Login</button>
      </div>
      <p id="authStatus"></p>
    </section>

    <section class="card hidden" id="resourceCard">
      <h2>Upload PDF Resources</h2>
      <form id="uploadForm">
        <input name="title" placeholder="Title" required />
        <select name="category" required>
          <option value="notes">Notes</option>
          <option value="important_questions">Important Questions</option>
          <option value="question_papers">Question Papers</option>
        </select>
        <input name="file" type="file" accept="application/pdf" required />
        <button type="submit">Upload PDF</button>
      </form>
      <p id="uploadStatus"></p>
    </section>

    <section class="card">
      <h2>Available Study Materials</h2>
      <div id="resources"></div>
    </section>

    <section class="card hidden" id="chatCard">
      <h2>Chatbot</h2>
      <div id="chatHistory" class="chat"></div>
      <div class="row">
        <input id="message" placeholder="Ask your question..." />
        <button onclick="sendMessage()">Send</button>
      </div>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
